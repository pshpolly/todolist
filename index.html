<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .todo-container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2 class="text-center mb-4 text-primary fw-bold">Мій ToDo List</h2>

        <div class="input-group mb-4">
            <input type="text" id="taskInput" class="form-control" placeholder="Введіть нове завдання..." aria-label="Нове завдання">
            <button class="btn btn-primary" type="button" id="addButton">ADD</button>
        </div>

        <fieldset>
            <legend class="fs-6 text-muted mb-2">Список завдань (натисніть для виконання):</legend>
            <div id="taskListContainer" class="list-group">
                </div>
        </fieldset>
    </div>

    <script src="script.js"></script>
</body>
</html>
